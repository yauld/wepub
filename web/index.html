<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="将 Markdown 和 Jupyter Notebook 转换成微信公众号文章">
  <title>wepub · 公众号文章工作台</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" aria-label="wepub 首页">
      <span class="brand-mark">w</span>
      <span>wepub</span>
    </a>
    <div class="privacy"><span class="privacy-dot"></span>内容仅在本机处理</div>
    <div class="top-actions">
      <button class="button button-icon" id="settingsButton" title="微信公众号设置">⚙</button>
      <button class="button button-secondary" id="downloadButton" disabled>下载 HTML</button>
      <button class="button button-primary" id="copyButton" disabled>复制到公众号</button>
      <button class="button button-wechat" id="publishButton" disabled>同步到草稿箱</button>
    </div>
  </header>

  <main class="workspace">
    <section class="editor-pane">
      <div class="pane-heading">
        <div>
          <p class="eyebrow">SOURCE</p>
          <h1>文章内容</h1>
        </div>
        <button class="file-button" id="openLocalButton" type="button">打开本地文档</button>
      </div>

      <div class="dropzone" id="dropzone">
        <div class="drop-icon">↥</div>
        <div>
          <strong>选择一个 Markdown 或 Notebook</strong>
          <span>wepub 会自动查找并处理文档关联的本地图片</span>
        </div>
      </div>

      <div class="file-meta" id="fileMeta" hidden>
        <span class="file-type" id="fileType">MD</span>
        <div class="file-detail">
          <strong id="fileName"></strong>
          <span id="assetSummary"></span>
        </div>
        <button class="icon-button" id="clearButton" title="清空">×</button>
      </div>

      <label class="editor-label" for="sourceEditor">
        <span id="editorLabel">Markdown</span>
        <span id="saveState">等待导入</span>
      </label>
      <textarea id="sourceEditor" spellcheck="false" placeholder="# 从这里开始写作

把 Markdown 文件拖到上方，或者直接在这里输入内容。"></textarea>

      <div class="messages" id="messages" hidden></div>
    </section>

    <section class="preview-pane">
      <div class="pane-heading preview-heading">
        <div>
          <p class="eyebrow">PREVIEW</p>
          <h2 id="previewTitle">公众号预览</h2>
        </div>
        <div class="view-switch" aria-label="预览宽度">
          <button class="switch-button active" data-width="desktop" title="桌面宽度">桌面</button>
          <button class="switch-button" data-width="mobile" title="手机宽度">手机</button>
        </div>
      </div>

      <div class="preview-stage" id="previewStage">
        <div class="empty-state" id="emptyState">
          <div class="empty-paper">
            <span></span><span></span><span></span><span></span>
          </div>
          <h3>文章会在这里成形</h3>
          <p>导入文件或开始输入，预览会自动更新</p>
        </div>
        <div class="article-canvas" id="articleCanvas" hidden>
          <div id="articlePreview"></div>
        </div>
      </div>
    </section>
  </main>

  <dialog class="modal" id="settingsDialog">
    <form class="modal-card" method="dialog" id="settingsForm">
      <div class="modal-heading">
        <div>
          <p class="eyebrow">WECHAT</p>
          <h2>微信公众号连接</h2>
        </div>
        <button class="icon-button" type="button" data-close-dialog aria-label="关闭">×</button>
      </div>
      <p class="modal-intro">凭据只发送到本机服务，并保存在 macOS Keychain。wepub 不会将 AppSecret 写入项目文件。</p>
      <label class="field">
        <span>AppID</span>
        <input id="wechatAppid" name="appid" autocomplete="off" placeholder="wx…" required>
      </label>
      <label class="field">
        <span>AppSecret</span>
        <input id="wechatSecret" name="secret" type="password" autocomplete="new-password" placeholder="仅在更新配置时填写" required>
      </label>
      <div class="connection-state" id="connectionState">尚未配置</div>
      <div class="modal-actions">
        <button class="button button-secondary" type="button" id="testConnectionButton">测试已有配置</button>
        <button class="button button-primary" type="submit">保存到 Keychain</button>
      </div>
    </form>
  </dialog>

  <dialog class="modal" id="publishDialog">
    <form class="modal-card modal-card-wide" method="dialog" id="publishForm">
      <div class="modal-heading">
        <div>
          <p class="eyebrow">DRAFT</p>
          <h2>同步到公众号草稿箱</h2>
        </div>
        <button class="icon-button" type="button" data-close-dialog aria-label="关闭">×</button>
      </div>
      <div class="publish-grid">
        <div class="publish-fields">
          <label class="field">
            <span>标题</span>
            <input id="draftTitle" maxlength="64" required>
          </label>
          <label class="field">
            <span>作者</span>
            <input id="draftAuthor" maxlength="16" placeholder="可选">
          </label>
          <label class="field">
            <span>摘要</span>
            <textarea id="draftDigest" maxlength="54" rows="3" placeholder="可选，留空由微信自动提取"></textarea>
          </label>
          <label class="field">
            <span>原文链接</span>
            <input id="draftSourceUrl" type="url" placeholder="可选">
          </label>
          <label class="check-field">
            <input id="draftComments" type="checkbox">
            <span>允许留言</span>
          </label>
        </div>
        <div class="cover-field">
          <span class="field-title">封面</span>
          <button class="cover-picker" id="coverPicker" type="button">
            <img id="coverPreview" alt="封面预览" hidden>
            <span id="coverPlaceholder">选择 JPG 或 PNG<br><small>将自动转换为微信缩略图</small></span>
          </button>
          <span class="cover-name" id="coverName"></span>
        </div>
      </div>
      <div class="publish-status" id="publishStatus"></div>
      <div class="modal-actions">
        <button class="button button-secondary" type="button" data-close-dialog>取消</button>
        <button class="button button-wechat" type="submit" id="confirmPublishButton">确认同步到草稿箱</button>
      </div>
    </form>
  </dialog>

  <dialog class="modal file-dialog" id="fileDialog">
    <form class="modal-card" method="dialog" id="fileBrowserForm">
      <div class="modal-heading">
        <div>
          <p class="eyebrow">LOCAL</p>
          <h2>选择本地文档</h2>
        </div>
        <button class="icon-button" type="button" data-close-dialog aria-label="关闭">×</button>
      </div>
      <div class="file-browser-bar">
        <input id="filePathInput" aria-label="当前目录">
        <button class="button button-secondary" id="fileHomeButton" type="button">主目录</button>
        <button class="button button-primary" type="submit">前往</button>
      </div>
      <div class="file-browser-list" id="fileBrowserList"></div>
      <div class="file-browser-status" id="fileBrowserStatus"></div>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
