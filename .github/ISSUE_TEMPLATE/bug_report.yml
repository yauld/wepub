name: Bug report
description: 报告转换、预览或公众号兼容问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: 问题描述
      description: 实际发生了什么？你期望看到什么？
    validations:
      required: true
  - type: textarea
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 选择……
        3. 点击……
    validations:
      required: true
  - type: input
    attributes:
      label: 环境
      placeholder: macOS 15, Node.js 22, Chrome 136
    validations:
      required: true
  - type: textarea
    attributes:
      label: 最小复现内容与截图
      description: 请先移除文档中的隐私数据。若是公众号兼容问题，请同时提供 wepub 预览和公众号编辑器结果截图。
  - type: dropdown
    attributes:
      label: 出现问题的位置
      options:
        - Web 工作台预览
        - 复制到公众号
        - 同步到公众号草稿箱
        - CLI 转换
        - 其他
